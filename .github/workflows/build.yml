name: Android IDE Build

# Migration note (2026-06-12):
# Rewrote from Slint/Rust + cargo-ndk pipeline to pure Kotlin/Jetpack Compose.
# Removed: Rust toolchain install, cargo cache, NDK install, cargo-ndk,
#          "cargo ndk build" steps, GTK/WebKit2GTK system deps, x86 Rust job.
# Preserved: JDK 17, Android SDK setup, Gradle wrapper generation,
#            Monaco bundling (scripts/fetch-monaco.sh), APK upload.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ANDROID_TARGET_SDK: "34"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint + Debug APK (fast feedback)
  # ─────────────────────────────────────────────
  check:
    name: Lint & Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Install the Android platform package so aapt2 and compileSdk 34 work.
      - name: Install Android platform
        run: sdkmanager "platforms;android-${{ env.ANDROID_TARGET_SDK }}"

      # Materialise the Gradle wrapper jar (gradle-wrapper.properties specifies 8.7).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: android-ide/android
        run: gradle wrapper --gradle-version=8.7

      # Download Monaco 0.52.0 AMD bundle into assets/editor/vs/.
      # vs/ is git-ignored (~20 MB); script is idempotent and exits early if present.
      - name: Bundle Monaco editor
        working-directory: android-ide
        run: bash scripts/fetch-monaco.sh

      - name: Lint
        working-directory: android-ide/android
        run: ./gradlew lint

      - name: Build debug APK
        working-directory: android-ide/android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-debug
          path: android-ide/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Release APK
  # ─────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-${{ env.ANDROID_TARGET_SDK }}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: android-ide/android
        run: gradle wrapper --gradle-version=8.7

      - name: Bundle Monaco editor
        working-directory: android-ide
        run: bash scripts/fetch-monaco.sh

      - name: Build release APK
        working-directory: android-ide/android
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-release
          path: android-ide/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
