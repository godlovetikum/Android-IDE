name: Android IDE Build

# Build pipeline rules:
#   Debug APK  — built automatically on push, PR, and manual dispatch.
#   Release APK — built ONLY on manual workflow_dispatch.
#                 Release builds must never run automatically.
#
# APK signing:
#   Debug APK:   always signed with the auto-generated Android SDK debug keystore.
#   Release APK: signed with a production keystore when the four KEYSTORE_*
#                secrets are configured in repo Settings → Secrets → Actions.
#                Base64 decoding is performed inside GitHub Actions (echo | base64 -d).
#                Gradle consumes the already-decoded keystore file on disk — Gradle
#                must not perform any base64 decoding operations.
#                Falls back to the debug keystore automatically when secrets are
#                absent (fork PRs, local dev — still produces an installable APK).
#
# Downloading the APK:
#   GitHub Actions wraps uploaded artifacts in a zip archive.
#   Download the artifact, unzip it, and install the .apk inside:
#     adb install app-debug.apk          (USB / wireless debugging)
#     adb install app-release.apk
#   Or transfer the .apk to the device and open it with a file manager
#   (requires "Install from unknown sources" enabled in Android settings).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ANDROID_TARGET_SDK: "34"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint + Debug APK (runs on every push / PR / dispatch)
  # ─────────────────────────────────────────────────────────────
  check:
    name: Lint & Debug Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-${{ env.ANDROID_TARGET_SDK }}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: android-ide/android
        run: gradle wrapper --gradle-version=8.7

      # Download Monaco 0.52.0 AMD bundle into assets/editor/vs/.
      # vs/ is git-ignored (~20 MB); script is idempotent and exits early if present.
      - name: Bundle Monaco editor
        working-directory: android-ide
        run: bash scripts/fetch-monaco.sh

      - name: Lint
        working-directory: android-ide/android
        run: ./gradlew lint

      # The debug keystore is used as a fallback when KEYSTORE_BASE64 is not set.
      # It is created automatically by `assembleDebug` in the `check` job, but
      # this job runs on a fresh runner — create it here if absent.
      - name: Ensure debug keystore exists (fallback signing)
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
            echo "Created debug keystore (fallback for unsigned release)."
          else
            echo "Debug keystore already exists."
          fi

      - name: Build debug APK
        working-directory: android-ide/android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-debug
          path: android-ide/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 2: Release APK — MANUAL DISPATCH ONLY
  # Release builds must never run automatically on push or PR.
  # ─────────────────────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-${{ env.ANDROID_TARGET_SDK }}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: android-ide/android
        run: gradle wrapper --gradle-version=8.7

      - name: Bundle Monaco editor
        working-directory: android-ide
        run: bash scripts/fetch-monaco.sh

      - name: Ensure debug keystore exists (fallback signing)
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
            echo "Created debug keystore (fallback for unsigned release)."
          else
            echo "Debug keystore already exists."
          fi

      - name: Report signing mode
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Signing mode: RELEASE (production keystore from secrets)"
          else
            echo "Signing mode: FALLBACK (debug keystore — secrets not configured)"
            echo "To enable release signing, add KEYSTORE_BASE64, KEYSTORE_PASSWORD,"
            echo "KEY_ALIAS, and KEY_PASSWORD to repo Settings → Secrets → Actions."
          fi

      # Base64 decoding is done here in the shell — Gradle reads the
      # already-decoded keystore file and must not do any decoding itself.
      - name: Restore release keystore
        working-directory: android-ide/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "Release keystore restored."
          else
            echo "No release keystore configured. Using debug signing fallback."
          fi

      - name: Build release APK
        working-directory: android-ide/android
        env:
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-release
          path: android-ide/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
