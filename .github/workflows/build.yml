name: Android IDE Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ANDROID_NDK_VERSION: "26.3.11579264"
  ANDROID_TARGET_SDK: "34"
  ANDROID_MIN_SDK: "26"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Check and lint (fast feedback, no NDK)
  # ─────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      # wry (used by the desktop editor module) requires GTK3 + WebKit2GTK headers.
      # Without these the glib-sys build script fails with "Package glib-2.0 was not found".
      - name: Install Linux system dependencies (GTK3 / WebKit2GTK for desktop wry build)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Format code
        working-directory: android-ide
        run: cargo fmt --all

      - name: Check formatting
        working-directory: android-ide
        run: cargo fmt --all -- --check

      - name: Clippy (host target only)
        working-directory: android-ide
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (host)
        working-directory: android-ide
        run: cargo build --all

      - name: Test (host)
        working-directory: android-ide
        run: cargo test --all

  # ─────────────────────────────────────────────
  # Job 2: Build Android arm64-v8a (release APK)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android (arm64-v8a)
    runs-on: ubuntu-latest
    #needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            android-ide/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-android-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Install NDK *and* the Android platform package.
      # i-slint-backend-android-activity's build script scans $ANDROID_HOME/platforms/
      # for android.jar. Without platforms;android-34 installed the scan finds nothing
      # and panics with "No Android platforms found".
      - name: Install NDK and Android platform
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "platforms;android-${{ env.ANDROID_TARGET_SDK }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_PLATFORM=$ANDROID_SDK_ROOT/platforms/android-${{ env.ANDROID_TARGET_SDK }}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Show Slint features
        working-directory: android-ide
        run: cargo tree -e features | grep slint

      - name: Build Rust library (arm64-v8a)
        working-directory: android-ide
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          RUST_BACKTRACE: full
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          cargo ndk -t arm64-v8a -o android/app/src/main/jniLibs build --release -p android-ide

      # Generate the Gradle wrapper jar (needed for ./gradlew).
      # The gradle-wrapper.properties file already specifies Gradle 8.7;
      # this step materialises the wrapper jar that ./gradlew delegates to.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: android-ide/android
        run: gradle wrapper --gradle-version=8.7

      # Download Monaco Editor 0.52.0 AMD bundle into assets/editor/vs/.
      # The vs/ directory is git-ignored to avoid committing ~20 MB of minified JS.
      # npm is pre-installed on ubuntu-latest; the script is idempotent.
      - name: Bundle Monaco editor (offline APK asset)
        working-directory: android-ide
        run: bash scripts/fetch-monaco.sh

      - name: Build APK
        working-directory: android-ide/android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-release-arm64
          path: android-ide/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: Build Android x86_64 (emulator target)
  # ─────────────────────────────────────────────
  build-android-x86:
    name: Build Android (x86_64, emulator)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            android-ide/target
          key: ${{ runner.os }}-cargo-android-x86-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Same platform fix as the arm64 job above.
      - name: Install NDK and Android platform
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "platforms;android-${{ env.ANDROID_TARGET_SDK }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_PLATFORM=$ANDROID_SDK_ROOT/platforms/android-${{ env.ANDROID_TARGET_SDK }}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust library (x86_64)
        working-directory: android-ide
        run: |
          cargo ndk -t x86_64 -o android/app/src/main/jniLibs build --release -p android-ide

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: android-ide/android
        run: gradle wrapper --gradle-version=8.7

      # Same Monaco bundle step as the arm64 job.
      - name: Bundle Monaco editor (offline APK asset)
        working-directory: android-ide
        run: bash scripts/fetch-monaco.sh

      - name: Build APK (debug, x86_64)
        working-directory: android-ide/android
        run: ./gradlew assembleDebug

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-debug-x86_64
          path: android-ide/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
