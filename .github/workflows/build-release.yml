name: Release Build

# MANUAL DISPATCH ONLY — release builds must never run automatically.
# Trigger: Actions tab → "Release Build" → "Run workflow".
#
# APK signing:
#   Signed with a production keystore when the four KEYSTORE_* secrets are
#   configured in repo Settings → Secrets → Actions.
#   Base64 decoding is performed here in the shell — Gradle reads the
#   already-decoded keystore file on disk and must not do any decoding itself.
#   Falls back to the debug keystore automatically when secrets are absent
#   (still produces an installable APK).
#
# Release keystore setup (one-time):
#   1. Generate a keystore:
#        keytool -genkeypair -v \
#          -keystore release.keystore \
#          -alias android-ide-release \
#          -keyalg RSA -keysize 4096 -validity 10000 \
#          -storepass <storePassword> -keypass <keyPassword> \
#          -dname "CN=Android IDE, O=YourOrg, C=US"
#   2. Base64-encode it (no line wrapping):
#        base64 -w 0 release.keystore > release.keystore.b64
#        # macOS: base64 -i release.keystore -o release.keystore.b64
#   3. Add four repository secrets (Settings → Secrets → Actions):
#        KEYSTORE_BASE64     — contents of release.keystore.b64
#        KEYSTORE_PASSWORD   — storePassword from step 1
#        KEY_ALIAS           — android-ide-release (or your alias)
#        KEY_PASSWORD        — keyPassword from step 1
#
# Downloading the APK:
#   GitHub Actions wraps uploaded artifacts in a zip archive.
#   Download the artifact, unzip it, and install the .apk inside:
#     adb install app-release.apk
#   Or transfer the .apk to the device and open it with a file manager
#   (requires "Install from unknown sources" enabled in Android settings).

on:
  workflow_dispatch:

env:
  ANDROID_TARGET_SDK: "34"

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-${{ env.ANDROID_TARGET_SDK }}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle wrapper
        working-directory: android-ide/android
        run: gradle wrapper --gradle-version=8.7

      # Download Monaco 0.52.0 AMD bundle into assets/editor/vs/.
      # vs/ is git-ignored (~20 MB); script is idempotent and exits early if present.
      - name: Bundle Monaco editor
        working-directory: android-ide
        run: bash scripts/fetch-monaco.sh

      - name: Lint
        working-directory: android-ide/android
        run: ./gradlew lint

      - name: Ensure debug keystore exists (fallback signing)
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
            echo "Created debug keystore (fallback for unsigned release)."
          else
            echo "Debug keystore already exists."
          fi

      - name: Report signing mode
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Signing mode: RELEASE (production keystore from secrets)"
          else
            echo "Signing mode: FALLBACK (debug keystore — secrets not configured)"
            echo "To enable release signing, add KEYSTORE_BASE64, KEYSTORE_PASSWORD,"
            echo "KEY_ALIAS, and KEY_PASSWORD to repo Settings → Secrets → Actions."
          fi

      # Base64 decoding is done here in the shell — Gradle reads the
      # already-decoded keystore file and must not do any decoding itself.
      - name: Restore release keystore
        working-directory: android-ide/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            # F018: printf avoids the trailing newline that echo appends — strict
            # base64 decoders treat the extra newline as a padding error and truncate
            # the output, producing a corrupt keystore (java.io.EOFException in keytool).
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > release.keystore
            # Size guard: a valid RSA 4096 keystore is at minimum ~1 KB.  Anything
            # smaller means decode produced garbage — fail immediately with a clear
            # diagnostic before the expensive keystore-validation and Gradle steps.
            KS_SIZE=$(wc -c < release.keystore)
            if [ "$KS_SIZE" -lt 1000 ]; then
              echo "::error::Decoded keystore is only ${KS_SIZE} bytes — likely corrupt." \
                   "Verify KEYSTORE_BASE64 was base64-encoded with -w 0 (no line wrapping)."
              exit 1
            fi
            echo "Release keystore restored (${KS_SIZE} bytes)."
          else
            echo "No release keystore configured. Using debug signing fallback."
          fi

      # Two-stage keystore validation — runs entirely before Gradle starts.
      #
      # Stage 1 (keytool -list): confirms the file is a valid JKS/PKCS12 store,
      #   the store password is correct, and the key alias exists.
      #   This is cheap and catches decode or password errors early.
      #
      # Stage 2 (jarsigner): actually unlocks the private key using KEY_PASSWORD.
      #   keytool -list only checks the store password; it never touches the key
      #   password. Gradle's packageRelease is the first place that calls
      #   KeyStore.getKey(alias, keyPassword), and when KEY_PASSWORD is wrong or
      #   blank it throws KeytoolException("Failed to read key … : null") with no
      #   useful context. jarsigner reproduces that exact code path on a throw-away
      #   JAR so the failure is caught here with an actionable error message.
      #
      # If KEYSTORE_BASE64 is absent both stages run against the fallback debug
      # keystore so the build always has a fully validated signing resource.
      - name: Validate keystore (store password + key password)
        working-directory: android-ide/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f release.keystore ]; then
            KS_FILE=release.keystore
            KS_PASS="$KEYSTORE_PASSWORD"
            KS_ALIAS="$KEY_ALIAS"
            KS_KEY_PASS="$KEY_PASSWORD"
            LABEL="release"
          else
            echo "No release keystore on disk — validating fallback debug keystore..."
            KS_FILE="$HOME/.android/debug.keystore"
            KS_PASS="android"
            KS_ALIAS="androiddebugkey"
            KS_KEY_PASS="android"
            LABEL="debug (fallback)"
          fi

          # ── Stage 1: store password + alias ─────────────────────────────
          echo "Stage 1: checking store password and alias for $LABEL keystore..."
          if ! keytool -list \
              -keystore "$KS_FILE" \
              -storepass "$KS_PASS" \
              -alias "$KS_ALIAS" 2>&1; then
            echo "::error::Keystore stage-1 validation failed for $LABEL keystore." \
                 "Check KEYSTORE_BASE64, KEYSTORE_PASSWORD, and KEY_ALIAS secrets."
            exit 1
          fi
          echo "Stage 1 passed."

          # ── Stage 2: key password (via jarsigner on a throw-away JAR) ───
          # jarsigner calls KeyStore.getKey(alias, keyPassword) — the exact
          # same path that packageRelease uses — so a bad KEY_PASSWORD fails
          # here instead of deep inside Gradle with a cryptic null message.
          echo "Stage 2: checking key password for alias '$KS_ALIAS'..."
          echo "placeholder" > /tmp/ks_dummy.txt
          jar cf /tmp/ks_dummy.jar -C /tmp ks_dummy.txt
          if ! jarsigner \
              -keystore "$KS_FILE" \
              -storepass "$KS_PASS" \
              -keypass "$KS_KEY_PASS" \
              /tmp/ks_dummy.jar "$KS_ALIAS" 2>&1; then
            echo "::error::Keystore stage-2 validation failed — key password" \
                 "rejected for alias '$KS_ALIAS' in $LABEL keystore." \
                 "Check the KEY_PASSWORD secret."
            exit 1
          fi
          rm -f /tmp/ks_dummy.txt /tmp/ks_dummy.jar
          echo "Stage 2 passed. $LABEL keystore fully validated."

      - name: Build release APK
        working-directory: android-ide/android
        env:
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-ide-release
          path: android-ide/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
