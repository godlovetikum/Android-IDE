# android-ide/android/gradle/wrapper/gradle-wrapper.properties
#
# Points to Gradle 8.7 which is compatible with Android Gradle Plugin 8.3.x.
# The wrapper jar is generated by the CI before the first build
# (see .github/workflows/build.yml "Generate Gradle wrapper" step).

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
