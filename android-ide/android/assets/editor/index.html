<!DOCTYPE html>
<!--
  android-ide/android/assets/editor/index.html

  Monaco Editor shell loaded by the Android WebView.

  Bridge protocol:
    Kotlin → JS: window.androidIDE.receiveMessage({ type, ...payload })
    JS → Kotlin: window.AndroidBridge.onMessage(jsonString)

  Message types:
    Kotlin → JS: loadFile, setTheme, setFontSize, requestSave, closeTab
    JS → Kotlin: ready, contentChanged, cursorMoved, fileSaved

  Monaco bundle:
    Loaded from vs/loader.js — the bundled AMD files in the same directory.
    On Android: file:///android_asset/editor/vs/loader.js
    Version: 0.52.0 (pinned in scripts/fetch-monaco.sh)
    To upgrade: update MONACO_VERSION in scripts/fetch-monaco.sh.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AndroidIDE Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
    #editor-root { width: 100%; height: 100%; }

    /* Loading indicator shown while Monaco initialises */
    #loading {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1e1e1e; color: #555; font-family: monospace; font-size: 14px;
      z-index: 10;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading editor…</div>
  <div id="editor-root"></div>

  <!--
    Monaco Editor AMD loader — served from the bundled vs/ directory.
    Do NOT replace this with a CDN URL: the APK must work offline.
    The vs/ directory is populated by scripts/fetch-monaco.sh during CI
    and must be downloaded locally before running a desktop dev build.
  -->
  <script src="vs/loader.js"></script>
  <script src="monaco-init.js"></script>
</body>
</html>
