<!DOCTYPE html>
<!--
  android-ide/android/assets/editor/index.html

  Monaco Editor shell page loaded by the Android WebView.

  Bridge protocol:
    Kotlin → JS: window.androidIDE.receiveMessage({ type, ...payload })
    JS → Kotlin: window.AndroidBridge.onMessage(jsonString)

  Message types:
    Kotlin → JS: loadFile, closeTab, setTheme, setFontSize, setEditorOptions,
                 forceLayout, executeCommand, showFind, showReplace, requestSave
    JS → Kotlin: ready, contentChanged, cursorMoved, fileSaved

  Monaco bundle:
    Loaded from vs/loader.js — the bundled AMD files in the same directory.
    On Android: file:///android_asset/editor/vs/loader.js
    Version: 0.52.0 (pinned in scripts/fetch-monaco.sh)
    To upgrade: update MONACO_VERSION in scripts/fetch-monaco.sh.

  Container sizing:
    #editor-root uses absolute positioning (top/left/right/bottom: 0) to fill
    the body regardless of the height:100% chain. This is the only reliable
    approach in Android WebView where the height chain can break during the
    transition from 0→measured dimensions before Compose lays out the WebView.
    editor.layout() is called explicitly from Kotlin after the WebView is
    in the Compose tree (triggered by the forceLayout message on editor ready).
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AndroidIDE Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #1e1e1e;
      overflow: hidden;
    }

    /*
     * Absolute positioning fills the body regardless of the height:100% chain.
     * This is critical: WebView loads this page before Compose has measured and
     * laid out the WebView widget. At that moment window.innerHeight = 0.
     * With height:100% the editor container would be 0px tall.
     * With absolute positioning the container fills the viewport as soon as
     * the WebView is given its final size, and editor.layout() (called via
     * forceLayout after editor ready) provides the exact pixel dimensions.
     */
    #editor-root {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e1e1e;
      color: #555;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
    }

    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading editor…</div>
  <div id="editor-root"></div>

  <!--
    Monaco Editor AMD loader — served from the bundled vs/ directory.
    Do NOT replace this with a CDN URL: the APK must work offline.
    The vs/ directory is populated by scripts/fetch-monaco.sh during CI
    and must be downloaded locally before running a desktop dev build.
  -->
  <script src="vs/loader.js"></script>
  <script src="monaco-init.js"></script>
</body>
</html>
