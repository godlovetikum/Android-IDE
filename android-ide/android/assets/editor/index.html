<!DOCTYPE html>
<!--
  android-ide/android/assets/editor/index.html

  Monaco Editor shell loaded by the Android WebView and the desktop wry webview.

  Bridge protocol:
    Rust → JS:  window.androidIDE.receiveMessage({ type, ...payload })
    JS → Native: window.AndroidBridge.onMessage(jsonString)   [Android]
                 window.__WRY_IPC__.postMessage(jsonString)    [Desktop / wry]

  Message types (matching bridge.rs):
    Rust → JS:  loadFile, setTheme, setFontSize, requestSave, closeTab
    JS → Rust:  ready, contentChanged, cursorMoved, fileSaved
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AndroidIDE Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
    #editor-root { width: 100%; height: 100%; }

    /* Loading indicator shown while Monaco initialises */
    #loading {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1e1e1e; color: #555; font-family: monospace; font-size: 14px;
      z-index: 10;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading editor…</div>
  <div id="editor-root"></div>

  <!--
    Monaco Editor via AMD loader.
    Using a fixed version (0.52.x) for reproducibility; upgrade deliberately.
    The vs/loader.js bootstraps the require() call below.
  -->
  <script src="https://unpkg.com/monaco-editor@0.52.0/min/vs/loader.js"></script>
  <script src="monaco-init.js"></script>
</body>
</html>
