# android-ide/android/gradle.properties
#
# Gradle project-wide properties.

# Heap size for the Gradle daemon. Slint .aar compilation is memory-intensive.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Required for AndroidX libraries.
android.useAndroidX=true

# Kotlin compiler warnings as errors (enable when Kotlin sources are added).
# kotlin.code.style=official
