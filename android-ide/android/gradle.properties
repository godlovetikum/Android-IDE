# android-ide/android/gradle.properties
#
# Gradle project-wide properties.

# Heap size for the Gradle daemon. 2 GB is sufficient for Kotlin + Compose compilation.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Required for AndroidX libraries.
android.useAndroidX=true

# Kotlin official code style.
kotlin.code.style=official
