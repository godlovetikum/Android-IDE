# android-ide/.cargo/config.toml
#
# Cargo configuration for Android cross-compilation.
#
# Usage:
#   cargo-ndk handles the linker path automatically via the
#   CARGO_TARGET_<TRIPLE>_LINKER environment variable. The entries here
#   set the required PIC flag for shared library (.so) output, which is
#   needed for all Android JNI libraries regardless of the toolchain.
#
#   Direct cross-compilation (without cargo-ndk):
#     export ANDROID_NDK_HOME=/path/to/ndk
#     export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=\
#       $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang
#     cargo build --target aarch64-linux-android --release
#
#   Via cargo-ndk (recommended, used by GitHub Actions CI):
#     cargo ndk -t arm64-v8a build --release

[build]
target-dir = "target"

# arm64-v8a — primary target for modern Android phones (API 21+)
[target.aarch64-linux-android]
rustflags = ["-C", "relocation-model=pic"]

# armeabi-v7a — 32-bit legacy devices (API 21+)
[target.armv7-linux-androideabi]
rustflags = ["-C", "relocation-model=pic"]

# x86_64 — Android emulator target for CI smoke tests
[target.x86_64-linux-android]
rustflags = ["-C", "relocation-model=pic"]

# x86 — older emulator images
[target.i686-linux-android]
rustflags = ["-C", "relocation-model=pic"]
